<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
  :root {
    --bg: rgba(11,10,13,0.65);
    --border: rgba(255,255,255,0.08);
    --text: #f3f4f6;
    --text-muted: #9ca3af;
    --green: #34d399;
    --green-glow: rgba(52,211,153,0.55);
    --red: #ef4444;
    --amber: #fbbf24;
    --scrim: #070408;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height: 100%; width: 100%; background: transparent;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none; overflow: hidden;
    font-family: 'Inter','Segoe UI','Microsoft YaHei',system-ui,sans-serif;
  }
  body {
    display: flex; align-items: flex-end; justify-content: center;
    padding: 0 10px 5px;
  }

  .capsule {
    display: flex; align-items: center; gap: 5px; padding: 3px 7px;
    border-radius: 999px; background: var(--bg);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    transition: all 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .capsule.expanded { width: 260px; }
  .capsule.collapsed { width: 120px; }

  .btn-icon {
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 50%; border: none;
    background: transparent; color: var(--text);
    cursor: pointer; transition: background 0.2s; flex-shrink: 0;
  }
  .btn-icon:hover { background: rgba(255,255,255,0.08); }
  .btn-icon:disabled { opacity: 0.25; cursor: default; pointer-events:none; }
  .btn-icon svg { width: 15px; height: 15px; stroke-width: 1.5; }

  .status-wrap { flex-shrink:0; width:18px; height:18px; position:relative; }
  .status-dot { position:absolute; inset:4px; border-radius:50%; background:var(--text-muted); transition:all 0.4s; }
  .status-dot.ok    { background:var(--green); box-shadow:0 0 10px var(--green-glow),0 0 22px var(--green-glow); animation:breathe 2.8s ease-in-out infinite; }
  .status-dot.check { background:var(--amber); animation:pulse 1.2s ease-in-out infinite; }
  .status-dot.fail  { background:var(--red); box-shadow:0 0 10px rgba(239,68,68,0.55); }
  @keyframes breathe { 0%,100%{ box-shadow:0 0 8px var(--green-glow),0 0 18px var(--green-glow) } 50%{ box-shadow:0 0 16px var(--green-glow),0 0 32px var(--green-glow) } }
  @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .url-area { flex:1; overflow:hidden; height:18px; cursor:pointer; display:flex; align-items:center; position:relative; }
  .url-text { position:absolute; inset:0; display:flex; align-items:center; font-size:12px; color:var(--text); white-space:nowrap; transition:all 0.35s ease-out; }
  .url-text.status { opacity:1; transform:translateY(0); }
  .url-text.url    { opacity:0; transform:translateY(14px); }
  .capsule.expanded .url-text.status { opacity:0; transform:translateY(-14px); }
  .capsule.expanded .url-text.url    { opacity:1; transform:translateY(0); }

  .gap { width: 20px; flex-shrink: 0; }

  .menu-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:100; display:flex; align-items:flex-start; justify-content:center; padding-top:70px; animation:fadeIn 0.15s ease-out; }
  .menu-card { background:rgba(22,21,25,0.95); backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px); border:1px solid var(--border); border-radius:18px; padding:8px; width:190px; box-shadow:0 16px 48px rgba(0,0,0,0.5); animation:scaleIn 0.22s cubic-bezier(0.34,1.56,0.64,1); }
  .menu-item { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:10px; font-size:13px; color:var(--text); cursor:pointer; transition:background 0.15s; border:none; background:transparent; width:100%; text-align:left; }
  .menu-item:hover { background:rgba(255,255,255,0.06); }
  .menu-divider { height:1px; background:var(--border); margin:3px 10px; }
  @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes scaleIn { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }
</style>
</head>
<body v-scope="App()">

  <!-- LEFT CAPSULE -->
  <div class="capsule" :class="expanded?'expanded':'collapsed'" @click="expand">
    <div class="status-wrap"><div class="status-dot" :class="status"></div></div>
    <div class="url-area">
      <span class="url-text status">在线</span>
      <span class="url-text url">{{ displayUrl }}</span>
    </div>
    <button class="btn-icon" @click.stop="toggleMenu" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </div>

  <div class="gap"></div>

  <!-- RIGHT CAPSULE -->
  <div class="capsule collapsed">
    <button class="btn-icon" :disabled="!canBack" @click="goBack" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="btn-icon" :disabled="!canForward" @click="goForward" aria-label="Forward">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <!-- MENU -->
  <div class="menu-overlay" v-if="menuOpen" @click="closeMenu">
    <div class="menu-card" @click.stop>
      <button class="menu-item" @click="doRefresh">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Refresh
      </button>
      <div class="menu-divider"></div>
      <button class="menu-item" @click="doSettings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </button>
      <div class="menu-divider"></div>
      <button class="menu-item" @click="doExit">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Exit Tavern
      </button>
    </div>
  </div>

<script src="https://unpkg.com/petite-vue@0.4.1/dist/petite-vue.iife.js" defer></script>
<script>
// ═══════ Capacitor-style bridge ═══════
const Native = {
  _cid: 0, _pending: {},
  call(method, params = {}) {
    return new Promise((resolve) => {
      const id = 'cb' + (++Native._cid);
      Native._pending[id] = resolve;
      TarvenBridge.call(method, JSON.stringify(params), id);
    });
  }
};
window.__tarvenCallback = function(id, result) {
  try { Native._pending[id]?.(JSON.parse(result)); } catch(e) {}
  delete Native._pending[id];
};

const Events = { _ls: {} };
window.__tarvenEmit = function(event, data) {
  (Events._ls[event] || []).forEach(fn => fn(data));
};

// ═══════ App ═══════
function App() {
  return {
    status: 'check', url: '127.0.0.1:8000', canBack: false, canForward: false,
    expanded: false, menuOpen: false, _timer: null,

    get displayUrl() {
      return this.url.replace(/^https?:\/\//,'').replace(/^www\./,'').slice(0,34);
    },

    mounted() {
      Events._ls['statusChanged'] = [];
      Events._ls['statusChanged'].push((d) => { this.status = d.status; });
      Events._ls['colorChanged'] = [];
      Events._ls['colorChanged'].push((d) => {
        document.documentElement.style.setProperty('--scrim', d.color);
      });
      Native.call('getNavState').then(s => { this.canBack = s.canBack; this.canForward = s.canForward; });
      Native.call('getUrl').then(u => { this.url = u; });
    },

    expand() {
      this.expanded = true; clearTimeout(this._timer);
      this._timer = setTimeout(() => { this.expanded = false; }, 3000);
    },
    toggleMenu(e) { e.stopPropagation(); this.menuOpen = !this.menuOpen; clearTimeout(this._timer); },
    closeMenu() { this.menuOpen = false; },

    goBack()    { Native.call('goBack'); Native.call('getNavState').then(s => { this.canBack = s.canBack; this.canForward = s.canForward; }); },
    goForward() { Native.call('goForward'); Native.call('getNavState').then(s => { this.canBack = s.canBack; this.canForward = s.canForward; }); },
    doRefresh() { Native.call('refresh'); this.closeMenu(); },
    doSettings(){ this.closeMenu(); },
    doExit()    { Native.call('exit'); this.closeMenu(); },
  };
}
PetiteVue.createApp({ App }).mount();
</script>
</body>
</html>
